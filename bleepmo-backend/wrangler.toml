name = "bleepmo"
compatibility_date = "2026-07-01"
pages_build_output_dir = "."

# D1 database binding — matches env.DB used in the functions/ code.
[[d1_databases]]
binding = "DB"
database_name = "bleepmo-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# R2 bucket binding — matches env.MEDIA used in the functions/ code.
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "bleepmo-media"
